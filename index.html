<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaNova | Sistema de Continuidad Humana</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-emerald: #10B981;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            /* Definición de la Proporción Áurea */
            --golden-ratio: 1.618;
            /* Base de diseño (puedes ajustar esta base) */
            --base-dim: 1vh; 
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .glow-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.07), transparent 70%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            /* Ancho del contenedor basado en la proporción áurea */
            max-width: calc(100vw / var(--golden-ratio));
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor del Logo con Proporción Áurea */
        .logo-container {
            /* Altura del logo basada en la proporción áurea */
            height: calc(12 * var(--base-dim)); 
            width: auto;
            /* Margen inferior basado en la proporción áurea */
            margin-bottom: calc(12 * var(--base-dim) * var(--golden-ratio));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            height: 100%; /* El logo llena la altura del contenedor */
            width: auto;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.5)); /* Glow sutil */
        }

        h1 {
            font-weight: 100;
            /* Tamaño del título basado en la proporción áurea de la base */
            font-size: calc(6 * var(--base-dim) * var(--golden-ratio));
            line-height: 1.05;
            margin-top: 0;
            /* Margen inferior basado en la proporción áurea */
            margin-bottom: calc(6 * var(--base-dim));
            letter-spacing: -0.1rem;
        }

        p {
            font-weight: 300;
            color: var(--text-muted);
            /* Tamaño del texto basado en la base */
            font-size: calc(2.5 * var(--base-dim));
            line-height: 1.6;
            margin-top: 0;
            /* Margen inferior basado en la proporción áurea */
            margin-bottom: calc(4 * var(--base-dim) * var(--golden-ratio));
            max-width: calc(60 * var(--base-dim));
        }

        .cta-btn {
            display: inline-block;
            background: transparent;
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: var(--accent-emerald);
            /* Padding basado en la proporción áurea */
            padding: calc(1.5 * var(--base-dim)) calc(1.5 * var(--base-dim) * var(--golden-ratio));
            border-radius: 2px;
            font-size: calc(1.5 * var(--base-dim));
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .cta-btn:hover {
            background: var(--accent-emerald);
            color: #000;
            border-color: var(--accent-emerald);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: calc(1 * var(--base-dim));
            letter-spacing: 0.4rem;
            color: #222;
            text-transform: uppercase;
            width: 100%;
            text-align: center;
        }

        /* Ajustes para móvil */
        @media (max-width: 768px) {
            :root {
                --base-dim: 1.2vh; /* Base ligeramente más grande en móvil */
            }
            .content {
                max-width: 90%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="content">
        <div class="logo-container">
            <img src="vn_logo-beta-1.png" alt="VitaNova Logo">
        </div>

        <h1>Tu vida está lista para ser rediseñada.</h1>
        <p>Detectamos señales invisibles de interrupción antes de que ocurran. Active su arquitectura de anticipación.</p>
        
        <a href="https://wa.me/573000000000?text=Hola%20VitaNova,%20quiero%20activar%20mi%20arquitectura%20de%20anticipación." class="cta-btn">
            Verificar Continuidad
        </a>
    </div>

    <div class="footer">
        VN OS — BOGOTÁ MMXXVI
    </div>

</body>
</html>
