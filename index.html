<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VitaNova | Sistema de Continuidad Humana</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-emerald: #10B981;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --golden-ratio: 1.618;
            --base-unit: 1rem;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        .glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.08), transparent 75%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 800px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 100%;
            margin-bottom: calc(var(--base-unit) * var(--golden-ratio) * 2);
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            width: 180px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.4));
        }

        h1 {
            font-weight: 100;
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            line-height: 1.1;
            margin: 0 0 calc(var(--base-unit) * var(--golden-ratio)) 0;
            letter-spacing: -0.05rem;
        }

        p {
            font-weight: 300;
            color: var(--text-muted);
            font-size: clamp(1rem, 4vw, 1.2rem);
            line-height: 1.6;
            margin: 0 0 calc(var(--base-unit) * var(--golden-ratio) * 2) 0;
            max-width: 500px;
        }

        .cta-container {
            display: flex;
            gap: calc(var(--base-unit) * var(--golden-ratio));
            flex-wrap: wrap;
            justify-content: center;
        }

        .cta-btn {
            display: inline-block;
            background: transparent;
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: var(--accent-emerald);
            padding: 1rem calc(1rem * var(--golden-ratio));
            font-size: 0.75rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.4s ease;
            border-radius: 2px;
            min-width: 220px;
        }

        .cta-btn.primary {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent-emerald);
        }

        .cta-btn:hover {
            background: var(--accent-emerald);
            color: #000;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .footer {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.6rem;
            letter-spacing: 0.3rem;
            color: #333;
            text-transform: uppercase;
            width: 100%;
            text-align: center;
        }

        @media (max-width: 480px) {
            .logo-container img { width: 140px; }
            .cta-container { flex-direction: column; width: 100%; }
            .cta-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="content">
        <div class="logo-container">
            <img src="vn_logo-beta-1.png" alt="VitaNova Logo">
        </div>
        <h1>Tu vida está lista para ser rediseñada.</h1>
        <p>Active su arquitectura de anticipación. Contacte a nuestro sistema Aurora para iniciar su proceso de continuidad.</p>
        
        <div class="cta-container">
            <a href="mailto:aurora@vitanova.global?subject=Solicitud de Continuidad&body=Hola Aurora, deseo iniciar el proceso con VitaNova." class="cta-btn primary">
                Contactar a Aurora
            </a>
            
            <a href="https://wa.me/573044216060?text=Hola%20Aurora,%20quiero%20activar%20mi%20arquitectura%20de%20anticipación." class="cta-btn">
                WhatsApp Directo
            </a>
        </div>
    </div>
    <div class="footer">VN OS — BOGOTÁ MMXXVI</div>
</body>
</html>
